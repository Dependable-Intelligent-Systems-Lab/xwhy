version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  
  jobs:
    install:
      - pip install uv
      
      - uv pip install --system -e .
      
      - uv export --group dev --no-hashes -o rtd-requirements.txt
      - uv pip install --system -r rtd-requirements.txt

mkdocs:
  configuration: mkdocs.yml
