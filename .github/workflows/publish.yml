name: Publish to PyPI and GitHub Releases

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers automatically when a semantic versioning tag is pushed (e.g., v0.1.0)

jobs:
  pypi-publish:
    name: Build, Publish, and Release
    runs-on: ubuntu-latest

    environment:
      name: pypi
      url: https://pypi.org/project/xwhy/
    
    # Required permissions for OIDC PyPI authentication and creating GitHub releases
    permissions:
      id-token: write  # Crucial for PyPI Trusted Publishing
      contents: write  # Crucial for creating a GitHub Release

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12 3.13

      - name: Run Nox (Sanity Check before release)
        run: uv run nox

      - name: Build Package (sdist and wheel)
        run: uv build

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*